name: CI/CD HTML

on:
  push:
    branches: [ "principal" ]
  pull_request:
    branches: [ "principal" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Verificar arquivos HTML
        run: ls -la *.html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy para GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
